# 元数据种类
type: app
# 应用ID
id: 13754910-336e-45a9-a9ba-5d3c1b9bf20c
# 应用图标（前端访问URI）
icon: /static/apps/13754910-336e-45a9-a9ba-5d3c1b9bf20c.png
# 应用种类
app_type: flow
# 应用的名称（展示用）
name: 测试应用
# 应用的描述（展示用，需少于150字）
description: |
  这是一个测试应用。
  可以在该文件夹中放置应用必需的配置，例如OpenAPI文档等。
# 应用包版本（展示用）
version: "1.0.0"
# 关联的用户账号
author: user01
# 是否已发布（由系统修改）
published: true
# 关联文件SHA256哈希（由系统修改）
hashes:
  flow/test.yaml: 4d29b8c93cbf7b0a1655b512d80270121e039494bc484fee60aef278fb0a202f

# 相关链接
links:
  - title: 测试链接
    url: https://www.example.com
# 预设问题
first_questions:
  - 这是测试指令
  - 样例问题？
# 对话轮次
history_len: 3
# 应用权限配置
permissions:
  # 权限类型（protected: 部分人可用，public: 公开， private: 私有）
  type: protected
  # 可访问的用户列表
  users:
    - test_user1
    - test_user2

# 工作流信息（只在工作流类型应用中存在）
flows:
  - id: 4eb1dc31-23d2-42a3-9e8a-14e83460610b  #工作流ID
    name: 测试工作流  # 工作流名称
    description: 这是一个测试工作流，用于测试工作流的执行流程。  # 工作流描述
    enabled: true  # 是否启用该工作流
    path: 4eb1dc31-23d2-42a3-9e8a-14e83460610b.yaml
    debug: true

# Agent可用的MCP Server列表（仅在MCP Agent类型应用中可用）
mcp_service:
  - test_mcp
