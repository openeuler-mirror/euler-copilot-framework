              - "https://127.0.0.1/api/auth/login"
              - "https://localhost/api/auth/login"
            # 授权范围
            scopes:
              - openid
              - profile
              - email
            # 响应类型
            response_types:
              - code
            # 授权类型
            grant_types:
              - authorization_code
            # 响应模式
            response_modes:
              - query
            # 用户信息签名算法；默认为none
            userinfo_signed_response_alg: none
            # 同意模式；默认为implicit
            consent_mode: implicit
            # 预配置同意持续时间；默认为1y
            pre_configured_consent_duration: 1y

