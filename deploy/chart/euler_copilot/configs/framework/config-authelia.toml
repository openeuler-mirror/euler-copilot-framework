[no_auth]
enable = false
user_sub = "openEuler"
user_name = "openEuler"

[deploy]
mode = 'local'
cookie = 'domain'
data_dir = '/app/data'

[login]
provider = 'authelia'
{{- $eulerCopilotDomain := .Values.domain.euler_copilot | default "http://127.0.0.1:30080" }}
{{- $autheliaDomain := .Values.domain.authelia }}
{{- if not $autheliaDomain }}
  {{- $baseHost := regexReplaceAll "^https?://|:[0-9]+$" $eulerCopilotDomain "" }}
  {{- $protocol := regexFind "^https?://" $eulerCopilotDomain }}
  {{- $autheliaPort := .Values.ports.authelia | default 30091 | toString }}
  {{- $autheliaDomain = printf "%s%s:%s" $protocol $baseHost $autheliaPort }}
{{- end }}
[login.settings]
# Authelia OIDC 服务器配置
host = '{{ $autheliaDomain }}'
client_id = '{{ .Values.login.authelia.client_id | default "euler-copilot" }}'
client_secret = '{{ .Values.login.authelia.client_secret | default "your-client-secret-here" }}'

# OIDC 端点配置
redirect_uri = '{{ $eulerCopilotDomain }}/api/auth/login'
authorization_endpoint = '{{ $autheliaDomain }}/api/oidc/authorization'
token_endpoint = '{{ $autheliaDomain }}/api/oidc/token'
userinfo_endpoint = '{{ $autheliaDomain }}/api/oidc/userinfo'
jwks_uri = '{{ $autheliaDomain }}/.well-known/jwks.json'
issuer = '{{ $autheliaDomain }}'

# OIDC 作用域和声明配置
scopes = 'openid profile email groups'
response_type = 'code'
response_mode = 'form_post'

# 用户设置页面重定向URL配置
redirect_settings_url = '{{ $autheliaDomain }}/authenticated'

# OIDC 高级配置
enable_pkce = true
pkce_challenge_method = 'S256'
token_endpoint_auth_method = 'client_secret_post'

# 会话和令牌配置
access_token_lifespan = '3600'  # 1小时
id_token_lifespan = '3600'      # 1小时
refresh_token_lifespan = '5400' # 90分钟

[fastapi]
domain = '{{ regexFind "^[^:]+" (.Values.domain.euler_copilot | default "http://127.0.0.1:30080" | replace "http://" "" | replace "https://" "") }}'

[security]
half_key1 = '${halfKey1}'
half_key2 = '${halfKey2}'
half_key3 = '${halfKey3}'
jwt_key = '${jwtKey}'

[embedding]
provider = '{{ .Values.models.embedding.provider }}'
endpoint = '{{ .Values.models.embedding.endpoint }}'
api_key = '{{ .Values.models.embedding.key }}'
model = '{{ .Values.models.embedding.name }}'

[reranker]
provider = '{{ default "" .Values.models.reranker.provider }}'
endpoint = '{{ default "" .Values.models.reranker.endpoint }}'
api_key = '{{ default "" .Values.models.reranker.key }}'
model = '{{ default "" .Values.models.reranker.name }}'

[rag]
rag_service = 'http://rag-service.{{ .Release.Namespace }}.svc.cluster.local:9988'

[mongodb]
host = 'mongo-db.{{ .Release.Namespace }}.svc.cluster.local'
port = 27017
user = 'euler_copilot'
password = '${mongo-password}'
database = 'euler_copilot'

[redis]
host = 'redis-db.{{ .Release.Namespace }}.svc.cluster.local'
port = 6379
password = '${redis-password}'
database = 0
decode_responses = true
socket_timeout = 5.0
socket_connect_timeout = 5.0
max_connections = 10
health_check_interval = 30

[minio]
endpoint = 'minio-service.{{ .Release.Namespace }}.svc.cluster.local:9000'
access_key = 'minioadmin'
secret_key = '${minio-password}'
secure = false

[llm]
endpoint = '{{ .Values.models.answer.endpoint }}'
key = '{{ .Values.models.answer.key }}'
model = '{{ .Values.models.answer.name }}'
max_tokens = {{ default 8192 .Values.models.answer.maxTokens }}
temperature = {{ default 0.7 .Values.models.answer.temperature }}

[function_call]
endpoint = '{{ default .Values.models.answer.endpoint .Values.models.functionCall.endpoint }}'
model = '{{ default .Values.models.answer.name .Values.models.functionCall.name }}'
api_key = '{{ default .Values.models.answer.key .Values.models.functionCall.key }}'
max_tokens = {{ default .Values.models.answer.maxTokens .Values.models.functionCall.maxTokens }}
temperature = {{ default .Values.models.answer.temperature .Values.models.functionCall.temperature }}

[check]
enable = false
words_list = ""

[sandbox]
sandbox_service = 'http://euler-copilot-sandbox-service.{{ .Release.Namespace }}.svc.cluster.local:8000'

[extra]
sql_url = ''
