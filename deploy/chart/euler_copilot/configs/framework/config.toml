[no_auth]
enable = false

[admin]
enable = true
user_sub = 'openEuler'
user_name = 'openEuler'

[deploy]
mode = 'local'
cookie = 'domain'
data_dir = '/app/data'

[login]
provider = '{{ .Values.login.provider | default "authhub" }}'
{{- if eq (.Values.login.provider | default "authhub") "openeuler" }}
{{- $openeulerDomain := .Values.domain.openeuler }}
{{- if not $openeulerDomain }}
  {{- $eulerCopilotDomain := .Values.domain.euler_copilot | default "http://127.0.0.1:30080" }}
  {{- $baseHost := regexReplaceAll "^https?://|:[0-9]+$" $eulerCopilotDomain "" }}
  {{- $protocol := regexFind "^https?://" $eulerCopilotDomain }}
  {{- $openeulerPort := .Values.ports.openeuler | default 30082 | toString }}
  {{- $openeulerDomain = printf "%s%s:%s" $protocol $baseHost $openeulerPort }}
{{- end }}
[login.settings]
host = '{{ $openeulerDomain }}'
redirect_settings_url = '{{ $openeulerDomain }}/my/zh/settings'
{{- else }}
[login.settings]
{{- $eulerCopilotDomain := .Values.domain.euler_copilot | default "http://127.0.0.1:30080" }}
{{- $authhubDomain := .Values.domain.authhub }}
{{- if not $authhubDomain }}
  {{- $baseHost := regexReplaceAll "^https?://|:[0-9]+$" $eulerCopilotDomain "" }}
  {{- $protocol := regexFind "^https?://" $eulerCopilotDomain }}
  {{- $authhubPort := .Values.ports.authhub | default 30081 | toString }}
  {{- $authhubDomain = printf "%s%s:%s" $protocol $baseHost $authhubPort }}
{{- end }}
host = '{{ $authhubDomain }}'
host_inner = 'http://authhub-backend-service.{{ .Release.Namespace }}.svc.cluster.local:11120'
login_api = '{{ .Values.domain.euler_copilot | default "http://127.0.0.1:30080" }}/api/auth/login'
app_id = '${clientId}'
app_secret = '${clientSecret}'
{{- end }}

[fastapi]
domain = '{{ regexFind "^[^:]+" (.Values.domain.euler_copilot | default "http://127.0.0.1:30080" | replace "http://" "" | replace "https://" "") }}'

[security]
half_key1 = '${halfKey1}'
half_key2 = '${halfKey2}'
half_key3 = '${halfKey3}'
jwt_key = '${jwtKey}'

[embedding]
type = '{{ default "openai" .Values.models.embedding.type }}'
endpoint = '{{ .Values.models.embedding.endpoint }}'
api_key = '{{ .Values.models.embedding.key }}'
model = '{{ default "bge-m3" .Values.models.embedding.name }}'
icon = '{{ .Values.models.embedding.icon }}'

[reranker]
type = '{{ .Values.models.reranker.type }}'
endpoint = '{{ .Values.models.reranker.endpoint }}'
api_key = '{{ .Values.models.reranker.key }}'
model = '{{ default "BAAI/bge-reranker-v2-m3" .Values.models.reranker.name }}'
icon = '{{ .Values.models.reranker.icon }}'

[rag]
rag_service = 'http://rag-service.{{ .Release.Namespace }}.svc.cluster.local:9988'

[mongodb]
host = 'mongo-db.{{ .Release.Namespace }}.svc.cluster.local'
port = 27017
user = 'euler_copilot'
password = '${mongo-password}'
database = 'euler_copilot'

[redis]
host = 'redis-db.{{ .Release.Namespace }}.svc.cluster.local'
port = 6379
password = '${redis-password}'
database = 0
decode_responses = true
socket_timeout = 5.0
socket_connect_timeout = 5.0
max_connections = 10
health_check_interval = 30

[minio]
endpoint = 'minio-service.{{ .Release.Namespace }}.svc.cluster.local:9000'
access_key = 'minioadmin'
secret_key = '${minio-password}'
secure = false

[llm]
endpoint = '{{ .Values.models.answer.endpoint }}'
key = '{{ .Values.models.answer.key }}'
model = '{{ .Values.models.answer.name }}'
max_tokens = {{ default 8192 .Values.models.answer.maxTokens }}
temperature = {{ default 0.7 .Values.models.answer.temperature }}

[function_call]
endpoint = '{{ default .Values.models.answer.endpoint .Values.models.functionCall.endpoint }}'
model = '{{ default .Values.models.answer.name .Values.models.functionCall.name }}'
api_key = '{{ default .Values.models.answer.key .Values.models.functionCall.key }}'
max_tokens = {{ default .Values.models.answer.maxTokens .Values.models.functionCall.maxTokens }}
temperature = {{ default 0.7 .Values.models.functionCall.temperature }}

[check]
enable = false
words_list = ""

[sandbox]
sandbox_service = 'http://euler-copilot-sandbox-service.{{ .Release.Namespace }}.svc.cluster.local:8000'

[extra]
sql_url = ''
